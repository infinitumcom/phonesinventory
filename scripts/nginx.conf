# PhonesInventory nginx site config
# 部署：复制到服务器 nginx 站点目录后，必须用 nginx-safe-reload 生效（禁止直接 nginx -s reload）

# ─── http-level directives (this file is included at http context) ───

# API rate limiting: 10 req/s per IP, burst 30
limit_req_zone $binary_remote_addr zone=piapi:10m rate=10r/s;

# gzip (520KB index.html compresses to ~90KB)
gzip on;
gzip_types text/html text/css application/javascript application/json;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name phonesinventory.com www.phonesinventory.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ { root /opt/phonesinventory; }

    # Redirect all HTTP to HTTPS (non-www)
    location / { return 301 https://phonesinventory.com$request_uri; }
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name www.phonesinventory.com;

    ssl_certificate /etc/letsencrypt/live/phonesinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phonesinventory.com/privkey.pem;

    return 301 https://phonesinventory.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name phonesinventory.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/phonesinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phonesinventory.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/phonesinventory;
    index index.html;

    # API proxy to Python server
    location /api/ {
        limit_req zone=piapi burst=30 nodelay;
        proxy_pass http://127.0.0.1:8580/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        # IMEI 第三方查询代理最长可达 120s，读超时须大于它
        proxy_read_timeout 180s;
    }

    # Static files caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Data dir retired (phones.js moved behind token-protected /api/phones)
    location /data/ { return 404; }

    location / {
        try_files $uri $uri/ /index.html;
        # no-cache + etag: 部署后员工刷新页面即拿到最新版（304 协商缓存）
        etag on;
        add_header Cache-Control "no-cache" always;
        # nginx 陷阱：location 内出现 add_header 后不再继承 server 级头，须重复安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Block sensitive files
    location ~ /\. { deny all; }
    location ~ \.py$ { deny all; }
    location ~ \.sh$ { deny all; }
    location ~ \.env$ { deny all; }
    location /scripts/ { deny all; }
    location ~ \.db(-shm|-wal)?$ { deny all; }
}
