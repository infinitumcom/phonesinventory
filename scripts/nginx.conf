server {
    listen 80;
    server_name phonesinventory.com www.phonesinventory.com;

    root /opt/phonesinventory;
    index index.html;

    # API proxy to Python server
    location /api/ {
        proxy_pass http://127.0.0.1:8580/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Data files - no cache (updated frequently)
    location /data/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block sensitive files
    location ~ /\. { deny all; }
    location ~ \.py$ { deny all; }
    location ~ \.sh$ { deny all; }
    location ~ \.env$ { deny all; }
    location /scripts/ { deny all; }
}
