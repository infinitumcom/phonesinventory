# HTTP → HTTPS redirect
server {
    listen 80;
    server_name phonesinventory.com www.phonesinventory.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ { root /opt/phonesinventory; }

    # Redirect all HTTP to HTTPS (non-www)
    location / { return 301 https://phonesinventory.com$request_uri; }
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name www.phonesinventory.com;

    ssl_certificate /etc/letsencrypt/live/phonesinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phonesinventory.com/privkey.pem;

    return 301 https://phonesinventory.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name phonesinventory.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/phonesinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phonesinventory.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/phonesinventory;
    index index.html;

    # API proxy to Python server
    location /api/ {
        proxy_pass http://127.0.0.1:8580/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Data files - no cache (updated frequently)
    location /data/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block sensitive files
    location ~ /\. { deny all; }
    location ~ \.py$ { deny all; }
    location ~ \.sh$ { deny all; }
    location ~ \.env$ { deny all; }
    location /scripts/ { deny all; }
}
